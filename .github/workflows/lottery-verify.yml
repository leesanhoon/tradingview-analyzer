name: Lottery Verify

on:
  schedule:
    - cron: "45 9 * * *"
    - cron: "55 9 * * *"
    - cron: "45 10 * * *"
  workflow_dispatch:
    inputs:
      region:
        description: "Miền cần xác minh"
        required: true
        type: choice
        options:
          - mien-bac
          - mien-trung
          - mien-nam

jobs:
  lottery-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Determine region from cron schedule
        id: region
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.region }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "45 9 * * *" ]; then
            echo "value=mien-nam" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "55 9 * * *" ]; then
            echo "value=mien-bac" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "45 10 * * *" ]; then
            echo "value=mien-trung" >> "$GITHUB_OUTPUT"
          fi

      - name: Run lottery verify
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: npm run lottery-verify -- ${{ steps.region.outputs.value }}
