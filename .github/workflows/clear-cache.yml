name: Clear Match Odds Cache

on:
  workflow_dispatch:

jobs:
  clear-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write

    steps:
      - name: Delete match-odds-cache entries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          REPO="${{ github.repository }}"
          echo "Listing caches matching prefix 'match-odds-cache-'..."
          KEYS=$(gh cache list --repo "$REPO" --key match-odds-cache- --json id --jq '.[].id')

          if [ -z "$KEYS" ]; then
            echo "No matching caches found."
            exit 0
          fi

          for ID in $KEYS; do
            echo "Deleting cache id $ID"
            gh cache delete "$ID" --repo "$REPO"
          done

          echo "Done. Next run of match-odds will start with empty data/."
