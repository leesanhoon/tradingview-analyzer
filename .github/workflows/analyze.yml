name: TradingView Chart Analysis

on:
  schedule:
    - cron: "5 0,4,8,12,16,20 * * 1-5"
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright OS deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VERIFY_PROVIDER: ${{ vars.VERIFY_PROVIDER }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CHART_SIGNAL_CONFIDENCE_THRESHOLD: ${{ vars.CHART_SIGNAL_CONFIDENCE_THRESHOLD }}
          CHART_VERIFY_MODEL_PRIMARY: ${{ vars.CHART_VERIFY_MODEL_PRIMARY }}
          CHART_ANALYSIS_MODEL: ${{ vars.CHART_ANALYSIS_MODEL }}
          CHART_VERIFY_MODEL_CLAUDE: ${{ vars.CHART_VERIFY_MODEL_CLAUDE }}
          POSITION_VERIFY_MODEL_GEMINI: ${{ vars.POSITION_VERIFY_MODEL_GEMINI }}
          POSITION_VERIFY_MODEL_CLAUDE: ${{ vars.POSITION_VERIFY_MODEL_CLAUDE }}
        run: npm run analyze
