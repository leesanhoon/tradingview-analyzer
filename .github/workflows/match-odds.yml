name: Match Odds Scanner

on:
  schedule:
    - cron: "0,30 * * * *"
  workflow_dispatch:

jobs:
  match-odds:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run match odds scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BETTING_X_HD: ${{ secrets.BETTING_X_HD }}
          BETTING_BASE_URL: ${{ secrets.BETTING_BASE_URL }}
          BETTING_CHAMP_ID: ${{ secrets.BETTING_CHAMP_ID }}
        run: npm run match-odds
