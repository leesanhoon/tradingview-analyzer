name: Match Odds Scanner

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  match-odds:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Restore data cache
        uses: actions/cache/restore@v4
        with:
          path: data
          key: match-odds-cache-${{ github.run_id }}
          restore-keys: |
            match-odds-cache-

      - name: Run match odds scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          ODDS_API_SPORT: ${{ secrets.ODDS_API_SPORT }}
          ODDS_API_REGION: ${{ secrets.ODDS_API_REGION }}
          ODDS_API_BOOKMAKER: ${{ secrets.ODDS_API_BOOKMAKER }}
        run: npm run match-odds

      - name: Save data cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data
          key: match-odds-cache-${{ github.run_id }}
